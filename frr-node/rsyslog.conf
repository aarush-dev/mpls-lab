# rsyslog.conf — frr-node syslog forwarder
# ponytail: sole job is read /dev/log → forward RFC5424 to promtail.
#           PROMTAIL_ADDR env var (default 172.20.20.55:1514) is baked in by
#           start.sh via envsubst before rsyslogd reads this file; override at
#           container launch with -e PROMTAIL_ADDR=<ip>:<port>.

# Load minimum modules: local socket input + network output.
module(load="imuxsock")   # reads /dev/log
module(load="omfwd")

# Forward everything to promtail over UDP in RFC5424 format.
# ponytail: UDP avoids blocking FRR if promtail is unreachable (fire-and-forget).
*.* action(type="omfwd"
           Target="${PROMTAIL_HOST}"
           Port="${PROMTAIL_PORT}"
           Protocol="udp"
           Template="RSYSLOG_SyslogProtocol23Format")
