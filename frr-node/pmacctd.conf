# pmacctd.conf — minimal IPFIX exporter for frr-node
# ponytail: NFACCTD_ADDR env var (default 172.20.20.53:2055) is substituted by
#           start.sh via envsubst before pmacctd reads this file; override at
#           container launch with -e NFACCTD_ADDR=<ip>:<port>.

daemonize: false
pcap_interface: any
pcap_filter: (ip or ip6) and not mpls

aggregate: src_host, dst_host, src_port, dst_port, proto, in_iface

plugins: nfprobe[ipfix]

nfprobe_receiver[ipfix]: ${NFACCTD_ADDR}
nfprobe_version[ipfix]: 10
