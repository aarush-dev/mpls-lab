# pmacctd.conf — minimal IPFIX exporter for frr-node
# ponytail: collector defaults to 127.0.0.1:2055 (no-op — UDP fire-and-forget,
#           nobody listens here) so pmacctd stays alive before Phase-2 nfacctd exists.
#           In Phase 2, Containerlab bind-mounts a node-specific pmacctd.conf with
#           the real nfacctd IP over this file at runtime — same pattern as snmpd.conf.

daemonize: false
pcap_interface: any

aggregate: src_host, dst_host, src_port, dst_port, proto, in_iface

plugins: nfprobe[ipfix]

# ponytail: Phase-2 placeholder — generator overwrites with nfacctd container IP.
nfprobe_receiver[ipfix]: 127.0.0.1:2055
nfprobe_version[ipfix]: 10
