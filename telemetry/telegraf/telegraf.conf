# =============================================================================
# Telegraf — SNMP IF-MIB poll of all 14 FRR nodes + Prometheus scrape of the
# SD-WAN controller, output to VictoriaMetrics via Prometheus remote-write.
# =============================================================================

[agent]
  interval = "30s"
  flush_interval = "30s"
  omit_hostname = true

# --- OUTPUT: VictoriaMetrics (native Prometheus remote-write endpoint) -------
[[outputs.http]]
  url = "http://172.20.20.50:8428/api/v1/write"
  data_format = "prometheusremotewrite"
  [outputs.http.headers]
    Content-Type = "application/x-protobuf"
    Content-Encoding = "snappy"
    X-Prometheus-Remote-Write-Version = "0.1.0"

# --- INPUT (a): SNMP IF-MIB on every FRR mgmt IP (.101-.114) ----------------
# community "public", v2c. One [[inputs.snmp]] lists all agents; the table
# block fans out per-interface rows tagged device + interface.
[[inputs.snmp]]
  agents = [
    "udp://172.20.20.101:161",    # p1
    "udp://172.20.20.102:161",    # p2
    "udp://172.20.20.103:161",    # p3
    "udp://172.20.20.104:161",    # p4
    "udp://172.20.20.105:161",    # p5
    "udp://172.20.20.106:161",    # pe1
    "udp://172.20.20.107:161",    # pe2
    "udp://172.20.20.108:161",    # pe3
    "udp://172.20.20.109:161",    # pe4
    "udp://172.20.20.110:161",    # pe5
    "udp://172.20.20.111:161",    # ce_branch1
    "udp://172.20.20.112:161",    # ce_branch2
    "udp://172.20.20.113:161",    # ce_branch3
    "udp://172.20.20.114:161",    # ce_branch4
    "udp://172.20.20.115:161",    # ce_branch5
    "udp://172.20.20.116:161",    # ce_branch6
    "udp://172.20.20.117:161",    # ce_branch7
    "udp://172.20.20.118:161",    # ce_branch8
    "udp://172.20.20.119:161",    # ce_branch9
    "udp://172.20.20.120:161",    # ce_branch10
    "udp://172.20.20.121:161",    # ce_branch11
    "udp://172.20.20.122:161",    # ce_branch12
    "udp://172.20.20.123:161",    # ce_branch13
    "udp://172.20.20.124:161",    # ce_branch14
    "udp://172.20.20.125:161",    # ce_branch15
    "udp://172.20.20.126:161",    # ce_branch16
    "udp://172.20.20.127:161",    # ce_hub1
    "udp://172.20.20.128:161",    # ce_hub2
    "udp://172.20.20.129:161",    # ce_hub3
    "udp://172.20.20.130:161",    # ce_hub4
    "udp://172.20.20.131:161",    # ce_dc1
    "udp://172.20.20.132:161",    # ce_dc2
    "udp://172.20.20.133:161",    # ce_dc3
    "udp://172.20.20.134:161",    # ce_dc4
  ]
  version = 2
  community = "public"
  timeout = "5s"
  retries = 1
  name = "snmp"
  # Numeric OIDs only — the official telegraf image ships no MIBs (air-gap safe,
  # no MIB files to bundle). OID map: sysName=1.3.6.1.2.1.1.5.0; IF-MIB table at
  # 1.3.6.1.2.1.2.2.1 (ifIndex .1, ifDescr .2, ifOperStatus .8) and HC counters
  # in ifXTable 1.3.6.1.2.1.31.1.1.1 (ifHCInOctets .6, ifHCOutOctets .10).

  # sysName -> "device" tag (host identity for every row from this agent)
  [[inputs.snmp.field]]
    name = "device"
    oid = "1.3.6.1.2.1.1.5.0"
    is_tag = true

  # Interface table: 64-bit HC counters + oper status, keyed by ifDescr.
  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["device"]

    [[inputs.snmp.table.field]]
      name = "ifIndex"
      oid = "1.3.6.1.2.1.2.2.1.1"
    [[inputs.snmp.table.field]]
      name = "interface"
      oid = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "1.3.6.1.2.1.2.2.1.8"
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = "1.3.6.1.2.1.31.1.1.1.6"
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = "1.3.6.1.2.1.31.1.1.1.10"

# =============================================================================
# PROCESSORS — add site_type + vrf tags for universal join schema
# =============================================================================

# site_type from device tag (sysName). Pattern order: most-specific first.
# p\d → core | pe\d → pe | ce_branch → branch | ce_hub → hub | ce_dc → dc
[[processors.regex]]
  namepass = ["interface"]
  [[processors.regex.tags]]
    key    = "device"
    pattern = "^(p[123])$"
    replacement = "core"
    result_key = "site_type"
  [[processors.regex.tags]]
    key    = "device"
    pattern = "^(pe[123])$"
    replacement = "pe"
    result_key = "site_type"
  [[processors.regex.tags]]
    key    = "device"
    pattern = "^ce_branch\\d+$"
    replacement = "branch"
    result_key = "site_type"
  [[processors.regex.tags]]
    key    = "device"
    pattern = "^ce_hub\\d+$"
    replacement = "hub"
    result_key = "site_type"
  [[processors.regex.tags]]
    key    = "device"
    pattern = "^ce_dc\\d+$"
    replacement = "dc"
    result_key = "site_type"

# vrf from interface tag: ifDescr "vrf_CORP" → vrf="CORP".
# Non-vrf interfaces: no vrf tag emitted (absent = not applicable).
[[processors.regex]]
  namepass = ["interface"]
  [[processors.regex.tags]]
    key        = "interface"
    pattern    = "^vrf_(\\w+)$"
    replacement = "${1}"
    result_key = "vrf"

# --- INPUT (b): SD-WAN controller Prometheus metrics ------------------------
# Controller exposes sdwan_* text exposition on :9362 (see controller/README.md).
# Pending: another agent brings the controller container up at 172.20.20.56.
[[inputs.prometheus]]
  urls = ["http://172.20.20.56:9362/metrics"]
  metric_version = 2
