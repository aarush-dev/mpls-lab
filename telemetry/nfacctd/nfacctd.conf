! nfacctd — IPFIX/NetFlow collector. Listens udp/2055, prints flows to stdout
! so they are verifiable via `docker logs tele-nfacctd`. Producers (pmacctd on
! the FRR nodes) are repointed here by another agent.
nfacctd_ip: 0.0.0.0
nfacctd_port: 2055
!
plugins: print[stdout]
print_output: json
print_output_file_append: true
print_refresh_time: 30
print_history: 30s
!
! peer_src_ip = IPFIX exporter mgmt IP; label = device name via pre_tag_map.
! Every flow record carries both the raw exporter IP and the device label.
aggregate: src_host, dst_host, src_port, dst_port, proto, tos, in_iface, peer_src_ip, label
!
! Maps exporter IP → device label (see device_map.txt).
pre_tag_map: /etc/pmacct/device_map.txt
