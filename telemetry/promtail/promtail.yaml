# Promtail — RFC5424 syslog receiver on tcp+udp/1514, push to Loki.
# FRR nodes forward syslog here once another agent adds rsyslog to the image.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://172.20.20.54:3100/loki/api/v1/push

scrape_configs:
  - job_name: syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: tcp
      idle_timeout: 60s
      label_structured_data: true
      use_rfc5424_message: true
      labels:
        job: syslog
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: host
      - source_labels: ['__syslog_message_hostname']
        target_label: device
      - source_labels: ['__syslog_message_severity']
        target_label: severity
      - source_labels: ['__syslog_message_app_name']
        target_label: app
    pipeline_stages:
      - match:
          selector: '{job="syslog"}'
          stages:
            - regex:
                expression: 'BGP.*ADJCHANGE.*neighbor (?P<bgp_peer>[0-9.]+) (?P<bgp_state>Up|Down)'
            - labels:
                bgp_peer:
                bgp_state:
            - regex:
                expression: 'LDP.*(peer|neighbor) (?P<ldp_peer>[0-9.]+).*(?P<ldp_event>Down|Up|operational)'
            - labels:
                ldp_peer:
                ldp_event:
            - regex:
                expression: 'OSPF.*interface (?P<ospf_iface>[a-z0-9]+) neighbor (?P<ospf_peer>[0-9.]+) changed from (?P<ospf_from>[A-Za-z]+) to (?P<ospf_to>[A-Za-z]+)'
            - labels:
                ospf_peer:
                ospf_to:

  # UDP listener (promtail needs a separate scrape block per protocol).
  - job_name: syslog_udp
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: udp
      idle_timeout: 60s
      label_structured_data: true
      use_rfc5424_message: true
      labels:
        job: syslog
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: host
      - source_labels: ['__syslog_message_hostname']
        target_label: device
      - source_labels: ['__syslog_message_severity']
        target_label: severity
      - source_labels: ['__syslog_message_app_name']
        target_label: app
    pipeline_stages:
      - match:
          selector: '{job="syslog"}'
          stages:
            - regex:
                expression: 'BGP.*ADJCHANGE.*neighbor (?P<bgp_peer>[0-9.]+) (?P<bgp_state>Up|Down)'
            - labels:
                bgp_peer:
                bgp_state:
            - regex:
                expression: 'LDP.*(peer|neighbor) (?P<ldp_peer>[0-9.]+).*(?P<ldp_event>Down|Up|operational)'
            - labels:
                ldp_peer:
                ldp_event:
            - regex:
                expression: 'OSPF.*interface (?P<ospf_iface>[a-z0-9]+) neighbor (?P<ospf_peer>[0-9.]+) changed from (?P<ospf_from>[A-Za-z]+) to (?P<ospf_to>[A-Za-z]+)'
            - labels:
                ospf_peer:
                ospf_to:
